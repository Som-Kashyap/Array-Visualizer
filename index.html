<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Array Visualizer</h1>

        <div class="input-section">
            <input
                type="text"
                id="userInput"
                placeholder="Enter an element...."
            >

            <button id="pushBtn">Push</button>
             <button id="popBtn">Pop</button>
            <button id="clearBtn">Clear</button>

        </div>

        <div class="action-section">
           
        </div>

        <div class="info">

            <p class="stats">Array Statistics:-</p>
            <p id="lengthDisplay">Length: 0</p>

            <div id="st-element">First Element is: </div>
            <div id="end-element">Last Element is: </div>
            <div id="sum">Sum of elements is: </div>

        </div>

        <div class="search-element"><input type="text" id="search-input" placeholder="Enter element to search...."> <button id="search-element-btn">search</button></div>
        <div class="display-search-idx" id="display_search">Search Result:- </div>

        <h3>Array Contents</h3>

        <div id="arrayContainer" class="array-container">

            <!-- JS inserts boxes here -->

        </div>

        <div class="style-section">Personalize:- <button id="theme_btn">Theme</button></div>

        <div class="operations" id="operations">Operation Performed:</div>

    </div>

    

    <script src="script.js"></script>

</body>
</html>
